<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Collab | Kanban</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800;900&amp;family=Work+Sans:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
    theme: {
      extend: {
        "colors": {
                "primary": "#795900",
                "primary-container": "#fbbf24",
                "on-surface": "#191c1e",
                "surface": "#f8f9fb",
                "surface-variant": "#e1e2e4",
                "charcoal": "#1F2937"
        }
      }
    }
  }
</script>
<style>
    .task-card { transition: all 0.2s ease; }
    .task-card:hover { transform: translate(-4px, -4px); box-shadow: 4px 4px 0px 0px #1F2937; }
</style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen">
<div id="app" class="hidden">
<header class="bg-white border-b-2 border-charcoal h-16 flex justify-between items-center px-6">
<h1 class="text-xl font-bold text-charcoal">Collab Board</h1>
<div class="flex items-center gap-3">
<span class="text-sm font-medium" id="user-name"></span>
<a href="profile.html" class="border-2 border-charcoal px-2 py-1 text-sm font-bold hover:bg-charcoal hover:text-white transition-colors">Profile</a>
<button class="border-2 border-charcoal px-3 py-1 text-sm font-bold hover:bg-charcoal hover:text-white transition-colors" id="logout-btn">Logout</button>
</div>
</header>
<main class="p-6">
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
<div class="bg-white border-2 border-charcoal p-4">
<h3 class="font-bold mb-2">To Do</h3>
<div id="todo-list" class="space-y-2 min-h-96"></div>
<button class="w-full border-2 border-dashed border-charcoal py-2 text-sm font-bold hover:bg-surface-variant mt-2" onclick="openTaskModal('todo')">+ Add Task</button>
</div>
<div class="bg-white border-2 border-charcoal p-4">
<h3 class="font-bold mb-2">In Progress</h3>
<div id="inprogress-list" class="space-y-2 min-h-96"></div>
<button class="w-full border-2 border-dashed border-charcoal py-2 text-sm font-bold hover:bg-surface-variant mt-2" onclick="openTaskModal('in_progress')">+ Add Task</button>
</div>
<div class="bg-white border-2 border-charcoal p-4">
<h3 class="font-bold mb-2">Review</h3>
<div id="review-list" class="space-y-2 min-h-96"></div>
<button class="w-full border-2 border-dashed border-charcoal py-2 text-sm font-bold hover:bg-surface-variant mt-2" onclick="openTaskModal('under_review')">+ Add Task</button>
</div>
<div class="bg-white border-2 border-charcoal p-4">
<h3 class="font-bold mb-2">Done</h3>
<div id="done-list" class="space-y-2 min-h-96"></div>
<button class="w-full border-2 border-dashed border-charcoal py-2 text-sm font-bold hover:bg-surface-variant mt-2" onclick="openTaskModal('completed')">+ Add Task</button>
</div>
</div>
</main>
</div>

<div id="auth-check" class="min-h-screen flex items-center justify-center">
<p>Please <a href="index.html" class="text-primary font-bold">login</a> to continue.</p>
</div>

<div id="task-modal" class="hidden fixed inset-0 z-[70]">
<div class="absolute inset-0 bg-black" id="task-backdrop"></div>
<div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
<div class="bg-surface border-2 border-charcoal w-full max-w-2xl max-h-[calc(100vh-4rem)] overflow-y-auto shadow-[6px_6px_0px_0px_#1F2937] pointer-events-auto">
<div class="bg-primary border-b-2 border-charcoal p-4">
<h2 class="text-xl font-bold text-white" id="modal-title">Add Task</h2>
</div>
<form id="task-form" class="p-6 space-y-4">
<input type="hidden" id="task-id"/>
<input type="hidden" id="task-status"/>
<div class="grid grid-cols-2 gap-4">
<div>
<label for="task-title" class="block font-bold text-sm mb-1">Title</label>
<input type="text" id="task-title" title="Task title" placeholder="Task title" required class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary"/>
</div>
<div>
<label for="task-priority" class="block font-bold text-sm mb-1">Priority</label>
<select id="task-priority" title="Task priority" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary">
<option value="low">Low</option>
<option value="medium" selected>Medium</option>
<option value="high">High</option>
<option value="urgent">Urgent</option>
</select>
</div>
</div>
<div>
<label for="task-desc" class="block font-bold text-sm mb-1">Description</label>
<textarea id="task-desc" title="Task description" placeholder="Task description" rows="3" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary"></textarea>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label for="task-status-select" class="block font-bold text-sm mb-1">Status</label>
<select id="task-status-select" title="Task status" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary">
<option value="todo">To Do</option>
<option value="in_progress">In Progress</option>
<option value="under_review">Review</option>
<option value="completed">Done</option>
</select>
</div>
<div>
<label for="task-assignee" class="block font-bold text-sm mb-1">Assignee</label>
<input type="text" id="task-assignee" list="user-list" placeholder="Select or type assignee name" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary"/>
<datalist id="user-list"></datalist>
</div>
</div>
<div class="grid grid-cols-3 gap-4">
<div>
<label for="task-start" class="block font-bold text-sm mb-1">Start Date</label>
<input type="date" id="task-start" title="Start date" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary"/>
</div>
<div>
<label for="task-end" class="block font-bold text-sm mb-1">End Date</label>
<input type="date" id="task-end" title="End date" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary"/>
</div>
<div>
<label for="task-due" class="block font-bold text-sm mb-1">Deadline</label>
<input type="date" id="task-due" title="Deadline" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label for="task-coordinator" class="block font-bold text-sm mb-1">Coordinator</label>
<input type="text" id="task-coordinator" title="Coordinator name" placeholder="Coordinator name" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary"/>
</div>
<div>
<label for="task-recurring" class="block font-bold text-sm mb-1">Recurring</label>
<select id="task-recurring" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary">
<option value="none">None</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
<option value="yearly">Yearly</option>
</select>
</div>
</div>
<div id="subtasks-section" class="border-2 border-charcoal p-3">
<div class="flex justify-between items-center mb-2">
<label class="block font-bold text-sm">Subtasks</label>
<button type="button" id="add-subtask-btn" class="text-xs bg-primary-container px-2 py-1 border border-charcoal font-bold">+ Add</button>
</div>
<div id="subtasks-list" class="space-y-2"></div>
</div>
<div id="attachments-section" class="border-2 border-charcoal p-3">
<div class="flex justify-between items-center mb-2">
<label class="block font-bold text-sm">Attachments</label>
<button type="button" id="add-attachment-btn" class="text-xs bg-primary-container px-2 py-1 border border-charcoal font-bold">+ Add</button>
</div>
<div id="attachments-list" class="space-y-2"></div>
</div>
<div id="comments-section" class="border-2 border-charcoal p-3">
<div class="flex justify-between items-center mb-2">
<label class="block font-bold text-sm">Comments</label>
</div>
<div id="comments-list" class="space-y-2 mb-2 max-h-32 overflow-y-auto"></div>
<div class="flex gap-2">
<input type="text" id="comment-input" placeholder="Add a comment" class="flex-1 border-2 border-charcoal px-3 py-1 text-sm focus:border-primary"/>
<button type="button" id="add-comment-btn" class="border-2 border-charcoal px-3 py-1 text-sm font-bold hover:bg-charcoal hover:text-white transition-colors">Post</button>
</div>
</div>
<div class="flex gap-2">
<button type="submit" class="flex-1 bg-primary-container text-charcoal font-bold py-2 border-2 border-charcoal">Save</button>
<button type="button" onclick="closeTaskModal()" class="flex-1 border-2 border-charcoal py-2">Cancel</button>
</div>
</form>
</div>
</div>
</div>

<div id="task-details-modal" class="hidden fixed inset-0 z-[70]">
<div class="absolute inset-0 bg-black" id="details-backdrop"></div>
<div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
<div class="bg-surface border-2 border-charcoal w-full max-w-2xl max-h-[calc(100vh-4rem)] overflow-y-auto shadow-[6px_6px_0px_0px_#1F2937] pointer-events-auto">
<div class="bg-primary border-b-2 border-charcoal p-4">
<h2 class="text-xl font-bold text-white">Task Details</h2>
</div>
<div id="task-details-content" class="p-6 space-y-3 text-sm"></div>
<div class="p-4 border-t-2 border-charcoal flex justify-end gap-2">
<button type="button" id="close-details-btn" class="px-4 py-2 border-2 border-charcoal font-bold hover:bg-charcoal hover:text-white transition-colors">Close</button>
</div>
</div>
</div>
</div>

<div id="input-modal" class="hidden fixed inset-0 z-[70] flex items-center justify-center">
<div class="absolute inset-0 bg-black" id="input-modal-backdrop"></div>
<div class="relative w-full max-w-md bg-white border-2 border-charcoal shadow-[6px_6px_0px_0px_#1F2937] p-6">
<h3 class="font-bold text-lg text-charcoal mb-4" id="input-modal-title">Input</h3>
<input type="text" id="input-modal-value" class="w-full border-2 border-charcoal px-4 py-2 mb-4 focus:border-primary"/>
<div class="flex justify-end gap-2">
<button type="button" id="input-modal-cancel" class="px-4 py-2 border-2 border-charcoal font-bold hover:bg-charcoal hover:text-white transition-colors">Cancel</button>
<button type="button" id="input-modal-ok" class="px-4 py-2 bg-primary-container text-charcoal border-2 border-charcoal font-bold hover:bg-primary transition-colors">OK</button>
</div>
</div>
</div>

<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');

if (!token) {
    document.getElementById('auth-check').innerHTML = '<p>Please <a href="index.html" class="text-primary font-bold">login</a> to continue.</p>';
    setTimeout(() => window.location.href = 'index.html', 1000);
} else {
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-name').textContent = user.name || 'User';
    loadUsers();
    loadTasks();
}

async function loadUsers() {
    try {
        const res = await fetch('/api/users', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const users = await res.json();
        const datalist = document.getElementById('user-list');
        datalist.innerHTML = users.map(u => `<option value="${u.name}">`).join('');
    } catch (err) {}
}

async function loadTasks() {
    try {
        const res = await fetch('/api/tasks', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const tasks = await res.json();
        
        const todo = tasks.filter(t => t.status === 'todo');
        const inprogress = tasks.filter(t => t.status === 'in_progress');
        const review = tasks.filter(t => t.status === 'under_review');
        const done = tasks.filter(t => t.status === 'completed');
        
        renderTasks('todo-list', todo);
        renderTasks('inprogress-list', inprogress);
        renderTasks('review-list', review);
        renderTasks('done-list', done);
    } catch (err) {
        console.log('No tasks or error loading');
    }
}

function getPriorityColor(priority) {
    switch(priority) {
        case 'urgent': return 'bg-red-100 text-red-800 border-red-300';
        case 'high': return 'bg-orange-100 text-orange-800 border-orange-300';
        case 'medium': return 'bg-yellow-100 text-yellow-800 border-yellow-300';
        case 'low': return 'bg-green-100 text-green-800 border-green-300';
        default: return 'bg-gray-100 text-gray-800 border-gray-300';
    }
}

function getDueDateBadge(dueDate) {
    if (!dueDate) return '';
    const due = new Date(dueDate);
    const now = new Date();
    const diff = (due - now) / (1000 * 60 * 60 * 24);
    if (diff < 0) return '<span class="text-xs px-2 py-0.5 bg-red-100 text-red-800 border border-red-300">Overdue</span>';
    if (diff <= 2) return '<span class="text-xs px-2 py-0.5 bg-yellow-100 text-yellow-800 border border-yellow-300">Due Soon</span>';
    return `<span class="text-xs px-2 py-0.5 bg-blue-100 text-blue-800 border border-blue-300">Due: ${due.toLocaleDateString()}</span>`;
}

function renderTasks(listId, tasks) {
    const el = document.getElementById(listId);
    el.innerHTML = tasks.map(task => `
        <div class="task-card bg-white border-2 border-charcoal p-3 cursor-pointer" onclick="viewTask('${task._id}')">
            <h4 class="font-bold text-sm">${task.title}</h4>
            <p class="text-xs text-gray-600 mt-1">${task.description || ''}</p>
            <div class="text-xs mt-1 space-y-1">
                ${getDueDateBadge(task.dueDate)}
                ${task.assignee ? `<span>Assignee: ${task.assignee.name || 'User'}</span>` : ''}
                ${task.recurring && task.recurring !== 'none' ? `<span>Recurring: ${task.recurring}</span>` : ''}
                ${task.subtasks && task.subtasks.length > 0 ? `<span>Subtasks: ${task.subtasks.filter(s => s.completed).length}/${task.subtasks.length}</span>` : ''}
            </div>
            <div class="flex justify-between items-center mt-2">
                <span class="text-xs px-2 py-0.5 border ${getPriorityColor(task.priority)}">${task.priority}</span>
                <div class="flex gap-2">
                    <button onclick="event.stopPropagation(); editTask('${task._id}')" class="text-xs text-primary font-bold">Edit</button>
                    <button onclick="event.stopPropagation(); deleteTask('${task._id}', event)" class="text-red-600 text-xs">Delete</button>
                </div>
            </div>
        </div>
    `).join('');
}

function openTaskModal(status) {
    document.getElementById('task-modal').classList.remove('hidden');
    document.getElementById('task-status').value = status;
    document.getElementById('task-status-select').value = status;
    document.getElementById('modal-title').textContent = 'Add Task';
    document.getElementById('task-form').reset();
    document.getElementById('subtasks-list').innerHTML = '';
    document.getElementById('attachments-list').innerHTML = '';
    document.getElementById('comments-list').innerHTML = '';
    document.getElementById('task-id').value = '';
}

function closeTaskModal() {
    document.getElementById('task-modal').classList.add('hidden');
}

async function ensureTaskId() {
    let id = document.getElementById('task-id').value;
    if (id) return id;
    const task = {
        title: document.getElementById('task-title').value || 'Untitled Task',
        description: document.getElementById('task-desc').value || '',
        priority: document.getElementById('task-priority').value || 'medium',
        status: document.getElementById('task-status-select').value || 'todo',
        dueDate: document.getElementById('task-due').value || null,
        startDate: document.getElementById('task-start').value || null,
        endDate: document.getElementById('task-end').value || null,
        coordinator: document.getElementById('task-coordinator').value || '',
        recurring: document.getElementById('task-recurring').value || 'none',
        assignee: document.getElementById('task-assignee').value || null
    };
    const res = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(task)
    });
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'Failed to create task');
    }
    const data = await res.json();
    document.getElementById('task-id').value = data._id;
    document.getElementById('modal-title').textContent = 'Edit Task';
    return data._id;
}

async function addSubtask() {
    const title = await showInputModal('Subtask title');
    if (!title) return;
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/subtasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ title })
        });
        if (!res.ok) throw new Error('Failed to add subtask');
        const task = await res.json();
        renderSubtasks(task.subtasks || []);
    } catch (err) {
        alert(err.message);
    }
}

async function removeSubtaskWrapper(index) {
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/subtasks/' + index, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Failed to remove subtask');
        const task = await res.json();
        renderSubtasks(task.subtasks || []);
    } catch (err) {
        alert(err.message);
    }
}

async function toggleSubtaskWrapper(index) {
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/subtasks/' + index, {
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Failed to toggle subtask');
        const task = await res.json();
        renderSubtasks(task.subtasks || []);
    } catch (err) {
        alert(err.message);
    }
}

async function addAttachment() {
    const name = await showInputModal('Attachment name');
    if (!name) return;
    const url = await showInputModal('Attachment URL');
    if (!url) return;
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/attachments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ name, url })
        });
        if (!res.ok) throw new Error('Failed to add attachment');
        const task = await res.json();
        renderAttachments(task.attachments || []);
    } catch (err) {
        alert(err.message);
    }
}

async function removeAttachmentWrapper(index) {
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/attachments/' + index, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Failed to remove attachment');
        const task = await res.json();
        renderAttachments(task.attachments || []);
    } catch (err) {
        alert(err.message);
    }
}

async function addComment() {
    const text = document.getElementById('comment-input').value.trim();
    if (!text) return;
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/comments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ text })
        });
        if (!res.ok) throw new Error('Failed to add comment');
        const task = await res.json();
        document.getElementById('comment-input').value = '';
        renderComments(task.comments || []);
    } catch (err) {
        alert(err.message);
    }
}

async function viewTask(id) {
    try {
        const res = await fetch('/api/tasks/' + id, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const task = await res.json();
        const content = document.getElementById('task-details-content');
        content.innerHTML = `
            <div><span class="font-bold">Title:</span> ${task.title}</div>
            <div><span class="font-bold">Description:</span> ${task.description || 'N/A'}</div>
            <div><span class="font-bold">Status:</span> ${task.status}</div>
            <div><span class="font-bold">Priority:</span> ${task.priority}</div>
            <div><span class="font-bold">Assignee:</span> ${task.assignee ? task.assignee.name || 'User' : 'Unassigned'}</div>
            <div><span class="font-bold">Coordinator:</span> ${task.coordinator || 'N/A'}</div>
            <div><span class="font-bold">Due Date:</span> ${task.dueDate ? new Date(task.dueDate).toLocaleString() : 'N/A'}</div>
            <div><span class="font-bold">Start Date:</span> ${task.startDate ? new Date(task.startDate).toLocaleString() : 'N/A'}</div>
            <div><span class="font-bold">End Date:</span> ${task.endDate ? new Date(task.endDate).toLocaleString() : 'N/A'}</div>
            <div><span class="font-bold">Recurring:</span> ${task.recurring || 'None'}</div>
            <div><span class="font-bold">Subtasks:</span> ${task.subtasks && task.subtasks.length > 0 ? task.subtasks.filter(s => s.completed).length + '/' + task.subtasks.length + ' completed' : 'None'}</div>
            <div><span class="font-bold">Attachments:</span> ${task.attachments && task.attachments.length > 0 ? task.attachments.map(a => `<a href="${a.url}" target="_blank" class="text-primary">${a.name}</a>`).join(', ') : 'None'}</div>
            <div><span class="font-bold">Comments:</span> ${task.comments && task.comments.length > 0 ? task.comments.map(c => `<div class="border-b border-gray-200 pb-1"><strong>${c.author}:</strong> ${c.text} <span class="text-gray-400">${new Date(c.createdAt).toLocaleString()}</span></div>`).join('') : 'None'}</div>
            <div><span class="font-bold">Time Spent:</span> ${Math.round((task.totalTimeSpent || 0) / 60)}h</div>
        `;
        document.getElementById('task-details-modal').classList.remove('hidden');
    } catch (err) {
        console.log('Error loading task details');
    }
}

function closeDetailsModal() {
    document.getElementById('task-details-modal').classList.add('hidden');
}

async function editTask(id) {
    try {
        const res = await fetch('/api/tasks/' + id, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const task = await res.json();
        document.getElementById('task-id').value = task._id;
        document.getElementById('task-title').value = task.title;
        document.getElementById('task-desc').value = task.description || '';
        document.getElementById('task-priority').value = task.priority || 'medium';
        document.getElementById('task-status').value = task.status;
        document.getElementById('task-status-select').value = task.status;
        document.getElementById('task-due').value = task.dueDate ? task.dueDate.split('T')[0] : '';
        document.getElementById('task-start').value = task.startDate ? task.startDate.split('T')[0] : '';
        document.getElementById('task-end').value = task.endDate ? task.endDate.split('T')[0] : '';
        document.getElementById('task-coordinator').value = task.coordinator || '';
        document.getElementById('task-recurring').value = task.recurring || 'none';
        document.getElementById('task-assignee').value = task.assignee ? task.assignee.name || task.assignee : '';
        
        renderSubtasks(task.subtasks || []);
        renderAttachments(task.attachments || []);
        renderComments(task.comments || []);
        
        document.getElementById('task-modal').classList.remove('hidden');
        document.getElementById('modal-title').textContent = 'Edit Task';
    } catch (err) {}
}

function renderSubtasks(subtasks) {
    const el = document.getElementById('subtasks-list');
    el.innerHTML = subtasks.map((st, i) => `
        <div class="flex items-center gap-2">
            <input type="checkbox" ${st.completed ? 'checked' : ''} onchange="toggleSubtaskWrapper(${i})" class="accent-charcoal"/>
            <span class="flex-1 text-sm ${st.completed ? 'line-through text-gray-500' : ''}">${st.title}</span>
            <button type="button" onclick="removeSubtaskWrapper(${i})" class="text-red-600 text-xs">x</button>
        </div>
    `).join('');
}

function renderAttachments(attachments) {
    const el = document.getElementById('attachments-list');
    el.innerHTML = attachments.map((att, i) => `
        <div class="flex items-center gap-2">
            <span class="flex-1 text-sm truncate">${att.name}</span>
            <a href="${att.url}" target="_blank" class="text-xs text-primary">View</a>
            <button type="button" onclick="removeAttachmentWrapper(${i})" class="text-red-600 text-xs">x</button>
        </div>
    `).join('');
}

function renderComments(comments) {
    const el = document.getElementById('comments-list');
    el.innerHTML = comments.map(c => `
        <div class="text-xs border-b border-gray-200 pb-1">
            <span class="font-bold">${c.author}:</span> ${c.text}
            <span class="text-gray-400 ml-1">${new Date(c.createdAt).toLocaleString()}</span>
        </div>
    `).join('');
}

async function ensureTaskId() {
    let id = document.getElementById('task-id').value;
    if (id) return id;
    const task = {
        title: document.getElementById('task-title').value || 'Untitled Task',
        description: document.getElementById('task-desc').value || '',
        priority: document.getElementById('task-priority').value || 'medium',
        status: document.getElementById('task-status-select').value || 'todo',
        dueDate: document.getElementById('task-due').value || null,
        startDate: document.getElementById('task-start').value || null,
        endDate: document.getElementById('task-end').value || null,
        coordinator: document.getElementById('task-coordinator').value || '',
        recurring: document.getElementById('task-recurring').value || 'none',
        assignee: document.getElementById('task-assignee').value || null
    };
    const res = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(task)
    });
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'Failed to create task');
    }
    const data = await res.json();
    document.getElementById('task-id').value = data._id;
    document.getElementById('modal-title').textContent = 'Edit Task';
    return data._id;
}

async function addSubtask() {
    const title = await showInputModal('Subtask title');
    if (!title) return;
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/subtasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ title })
        });
        if (!res.ok) throw new Error('Failed to add subtask');
        const task = await res.json();
        renderSubtasks(task.subtasks || []);
    } catch (err) {
        alert(err.message);
    }
}

async function removeSubtaskWrapper(index) {
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/subtasks/' + index, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Failed to remove subtask');
        const task = await res.json();
        renderSubtasks(task.subtasks || []);
    } catch (err) {
        alert(err.message);
    }
}

async function toggleSubtaskWrapper(index) {
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/subtasks/' + index, {
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Failed to toggle subtask');
        const task = await res.json();
        renderSubtasks(task.subtasks || []);
    } catch (err) {
        alert(err.message);
    }
}

async function addAttachment() {
    const name = await showInputModal('Attachment name');
    if (!name) return;
    const url = await showInputModal('Attachment URL');
    if (!url) return;
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/attachments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ name, url })
        });
        if (!res.ok) throw new Error('Failed to add attachment');
        const task = await res.json();
        renderAttachments(task.attachments || []);
    } catch (err) {
        alert(err.message);
    }
}

async function removeAttachmentWrapper(index) {
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/attachments/' + index, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Failed to remove attachment');
        const task = await res.json();
        renderAttachments(task.attachments || []);
    } catch (err) {
        alert(err.message);
    }
}

async function addComment() {
    const text = document.getElementById('comment-input').value.trim();
    if (!text) return;
    try {
        const id = document.getElementById('task-id').value || await ensureTaskId();
        const res = await fetch('/api/tasks/' + id + '/comments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ text })
        });
        if (!res.ok) throw new Error('Failed to add comment');
        const task = await res.json();
        document.getElementById('comment-input').value = '';
        renderComments(task.comments || []);
    } catch (err) {
        alert(err.message);
    }
}

async function deleteTask(id, e) {
    e.stopPropagation();
    if (confirm('Delete this task?')) {
        await fetch('/api/tasks/' + id, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        loadTasks();
    }
}

document.getElementById('task-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('task-id').value;
    const task = {
        title: document.getElementById('task-title').value || 'Untitled Task',
        description: document.getElementById('task-desc').value || '',
        priority: document.getElementById('task-priority').value || 'medium',
        status: document.getElementById('task-status-select').value || 'todo',
        dueDate: document.getElementById('task-due').value || null,
        startDate: document.getElementById('task-start').value || null,
        endDate: document.getElementById('task-end').value || null,
        coordinator: document.getElementById('task-coordinator').value || '',
        recurring: document.getElementById('task-recurring').value || 'none',
        assignee: document.getElementById('task-assignee').value || null
    };
    
    const method = id ? 'PUT' : 'POST';
    const url = id ? '/api/tasks/' + id : '/api/tasks';
    
    const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(task)
    });
    
    let data = null;
    if (res.ok) {
        data = await res.json();
        document.getElementById('task-id').value = data._id;
        document.getElementById('modal-title').textContent = 'Edit Task';
    }
    
    const modal = document.getElementById('task-modal');
    modal.classList.add('hidden');
    await loadTasks();
    
    if (data && data._id) {
        editTask(data._id);
    }
});

document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'index.html';
});

document.getElementById('close-details-btn').addEventListener('click', closeDetailsModal);

document.getElementById('details-backdrop').addEventListener('click', closeDetailsModal);

document.getElementById('task-details-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('task-details-modal')) {
        closeDetailsModal();
    }
});

document.getElementById('add-subtask-btn').addEventListener('click', addSubtask);
document.getElementById('add-attachment-btn').addEventListener('click', addAttachment);
document.getElementById('add-comment-btn').addEventListener('click', addComment);

function showInputModal(title, defaultValue = '') {
    return new Promise((resolve) => {
        const modal = document.getElementById('input-modal');
        const titleEl = document.getElementById('input-modal-title');
        const input = document.getElementById('input-modal-value');
        const okBtn = document.getElementById('input-modal-ok');
        const cancelBtn = document.getElementById('input-modal-cancel');
        
        titleEl.textContent = title;
        input.value = defaultValue;
        modal.classList.remove('hidden');
        input.focus();
        
        function cleanup() {
            modal.classList.add('hidden');
            okBtn.replaceWith(okBtn.cloneNode(true));
            cancelBtn.replaceWith(cancelBtn.cloneNode(true));
        }
        
        okBtn.addEventListener('click', () => {
            cleanup();
            resolve(input.value);
        });
        
        cancelBtn.addEventListener('click', () => {
            cleanup();
            resolve(null);
        });
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                cleanup();
                resolve(input.value);
            } else if (e.key === 'Escape') {
                cleanup();
                resolve(null);
            }
        });
    });
}

document.getElementById('input-modal-backdrop').addEventListener('click', () => {
    document.getElementById('input-modal').classList.add('hidden');
});

loadTasks();
setInterval(loadTasks, 3000);
</script>
