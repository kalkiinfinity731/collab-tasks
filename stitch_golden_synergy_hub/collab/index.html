<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Collab | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800;900&amp;family=Work+Sans:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = {
    theme: {
      extend: {
        "colors": {
                "primary": "#795900",
                "primary-container": "#fbbf24",
                "on-surface": "#191c1e",
                "surface": "#f8f9fb",
                "charcoal": "#1F2937",
                "error": "#ba1a1a"
        }
      }
    }
  }
</script>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full bg-white border-2 border-charcoal p-8 shadow-[6px_6px_0px_0px_#1F2937]">
<div class="text-center mb-8">
<div class="w-12 h-12 bg-primary-container mx-auto mb-4 flex items-center justify-center border-2 border-charcoal">
<span class="material-symbols-outlined text-2xl">bolt</span>
</div>
<h1 class="font-bold text-2xl text-charcoal">Welcome Back</h1>
<p class="text-on-surface-variant mt-2">Sign in to your Collab account</p>
</div>

<form id="loginForm" class="space-y-4">
<div>
<label class="block font-bold text-sm mb-2">Email</label>
<input type="email" id="email" required class="w-full border-2 border-charcoal px-4 py-2 focus:border-primary transition-all" placeholder="you@example.com"/>
</div>
<div>
<label class="block font-bold text-sm mb-2">Password</label>
<input type="password" id="password" required class="w-full border-2 border-charcoal px-4 py-2 focus:border-primary transition-all" placeholder="••••••••"/>
</div>
<div id="errorMsg" class="text-error text-sm hidden"></div>
<button type="submit" class="w-full bg-primary-container text-charcoal font-bold py-3 px-4 border-2 border-charcoal">
Sign In
</button>
</form>

<p class="text-center text-sm mt-6">
Don't have an account? <a href="register.html" class="text-primary font-bold">Register</a>
</p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMsg');
    
    try {
        const res = await fetch('/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'kanban.html';
        } else {
            errorDiv.textContent = data.message || 'Login failed';
            errorDiv.classList.remove('hidden');
        }
    } catch (err) {
        errorDiv.textContent = 'Connection error. Is backend running?';
        errorDiv.classList.remove('hidden');
    }
});
</script>
</body>
</html>
