<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Collab | Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800;900&amp;family=Work+Sans:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = {
    theme: {
      extend: {
        "colors": { "primary": "#795900", "primary-container": "#fbbf24", "on-surface": "#191c1e", "surface": "#f8f9fb", "charcoal": "#1F2937", "error": "#ba1a1a" }
      }
    }
  }
</script>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-4">
<div id="app" class="max-w-md w-full bg-white border-2 border-charcoal p-8 shadow-[6px_6px_0px_0px_#1F2937] relative z-10">

<div id="designation-modal" class="hidden fixed inset-0 z-[70]">
<div class="absolute inset-0 bg-black" id="designation-backdrop"></div>
<div class="absolute right-4 top-4 max-h-[calc(100vh-2rem)] w-80 bg-white border-2 border-charcoal shadow-[6px_6px_0px_0px_#1F2937] flex flex-col z-10">
<div class="p-4 border-b-2 border-charcoal">
<h3 class="font-bold text-lg text-charcoal">Select Designation</h3>
</div>
<div class="p-2 space-y-1 flex-1 overflow-y-auto">
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="developer" class="accent-charcoal"/>
<span class="font-body-md">Developer</span>
</label>
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="tester" class="accent-charcoal"/>
<span class="font-body-md">Tester</span>
</label>
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="team_lead" class="accent-charcoal"/>
<span class="font-body-md">Team Lead</span>
</label>
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="manager" class="accent-charcoal"/>
<span class="font-body-md">Manager</span>
</label>
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="team_member" class="accent-charcoal"/>
<span class="font-body-md">Team Member</span>
</label>
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="designer" class="accent-charcoal"/>
<span class="font-body-md">Designer</span>
</label>
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="product_owner" class="accent-charcoal"/>
<span class="font-body-md">Product Owner</span>
</label>
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="scrum_master" class="accent-charcoal"/>
<span class="font-body-md">Scrum Master</span>
</label>
<label class="flex items-center gap-3 p-3 hover:bg-surface cursor-pointer border-2 border-transparent hover:border-charcoal transition-all">
<input type="radio" name="designation" value="others" class="accent-charcoal" id="others-radio"/>
<span class="font-body-md">Others</span>
</label>
<div id="custom-designation-container" class="hidden p-3 border-t-2 border-charcoal">
<label class="block font-bold text-sm mb-2">Enter Designation</label>
<input type="text" id="custom-designation" placeholder="Type your designation" class="w-full border-2 border-charcoal px-3 py-2 focus:border-primary"/>
</div>
</div>
<div class="p-3 border-t-2 border-charcoal flex justify-end gap-2">
<button type="button" id="cancel-designation" class="px-4 py-2 border-2 border-charcoal font-bold hover:bg-charcoal hover:text-white transition-colors">Cancel</button>
<button type="button" id="save-designation" class="px-4 py-2 bg-primary-container text-charcoal border-2 border-charcoal font-bold hover:bg-primary transition-colors">Save</button>
</div>
</div>
</div>
</div>
</div>

<input type="hidden" id="designation" value=""/>
<div>
<label class="block font-bold text-sm mb-2">Company Name</label>
<input type="text" id="companyName" class="w-full border-2 border-charcoal px-4 py-2 focus:border-primary"/>
</div>
<div>
<label class="block font-bold text-sm mb-2">Team Name</label>
<input type="text" id="teamName" class="w-full border-2 border-charcoal px-4 py-2 focus:border-primary"/>
</div>
<div>
<label class="block font-bold text-sm mb-2">Team Type</label>
<select id="userType" class="w-full border-2 border-charcoal px-4 py-2 focus:border-primary">
<option value="student">Student</option>
<option value="office">Office</option>
<option value="personal_team">Personal Team</option>
<option value="family">Family</option>
<option value="event_team">Event Organising Team</option>
<option value="others">Others</option>
</select>
</div>
<div>
<label class="block font-bold text-sm mb-2">Room Code</label>
<div class="flex gap-2">
<input type="text" id="roomCode" readonly class="flex-1 border-2 border-charcoal px-4 py-2 bg-surface focus:border-primary"/>
<button type="button" id="generate-room-btn" class="border-2 border-charcoal px-4 py-2 font-bold hover:bg-charcoal hover:text-white transition-colors">Generate</button>
</div>
</div>
<div id="errorMsg" class="text-error text-sm hidden"></div>
<button type="submit" class="w-full bg-primary-container text-charcoal font-bold py-3 px-4 border-2 border-charcoal">
Save Profile
</button>
</form>

<p class="text-center text-sm mt-6">
<a href="kanban.html" class="text-primary font-bold">Back to Board</a>
</p>
<button type="button" id="logout-btn" class="w-full border-2 border-charcoal px-3 py-2 text-sm font-bold hover:bg-charcoal hover:text-white transition-colors mt-4">Logout</button>
</div>

<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');

document.getElementById('name').value = user.name || '';
document.getElementById('email').value = user.email || '';
document.getElementById('designation').value = user.designation || user.role || '';
const initialDesignation = document.getElementById('designation').value;
if (initialDesignation) {
    document.getElementById('designation-text').textContent = initialDesignation.charAt(0).toUpperCase() + initialDesignation.slice(1).replace(/_/g, ' ');
}
document.getElementById('companyName').value = user.companyName || '';
document.getElementById('teamName').value = user.teamName || '';
document.getElementById('roomCode').value = user.roomCode || '';
document.getElementById('userType').value = user.userType || 'personal_team';

document.getElementById('generate-room-btn').addEventListener('click', () => {
    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('roomCode').value = code;
});

document.getElementById('designation-btn').addEventListener('click', () => {
    const modal = document.getElementById('designation-modal');
    modal.classList.remove('hidden');
    modal.querySelector('input[name="designation"]')?.focus();
});

document.getElementById('cancel-designation').addEventListener('click', () => {
    document.getElementById('designation-modal').classList.add('hidden');
});

document.getElementById('designation-backdrop').addEventListener('click', () => {
    document.getElementById('designation-modal').classList.add('hidden');
});

document.getElementById('others-radio').addEventListener('change', () => {
    if (document.getElementById('others-radio').checked) {
        document.getElementById('custom-designation-container').classList.remove('hidden');
        document.getElementById('custom-designation').focus();
    }
});

document.querySelectorAll('input[name="designation"]').forEach(radio => {
    radio.addEventListener('change', () => {
        if (radio.value !== 'others') {
            document.getElementById('custom-designation-container').classList.add('hidden');
        }
    });
});

document.getElementById('save-designation').addEventListener('click', () => {
    const selected = document.querySelector('input[name="designation"]:checked');
    if (selected) {
        let designationValue = selected.value;
        if (designationValue === 'others') {
            const customValue = document.getElementById('custom-designation').value.trim();
            if (!customValue) {
                alert('Please enter your designation');
                return;
            }
            designationValue = customValue;
        }
        document.getElementById('designation').value = designationValue;
        document.getElementById('designation-text').textContent = designationValue.charAt(0).toUpperCase() + designationValue.slice(1).replace(/_/g, ' ');
        document.getElementById('designation-modal').classList.add('hidden');
        document.getElementById('modal-overlay').classList.add('hidden');
    }
});

document.getElementById('logout-btn').addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'index.html';
});

document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('errorMsg');
    
    try {
        const res = await fetch('/api/users/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({
                name: document.getElementById('name').value,
                designation: document.getElementById('designation').value,
                companyName: document.getElementById('companyName').value,
                teamName: document.getElementById('teamName').value,
                roomCode: document.getElementById('roomCode').value,
                userType: document.getElementById('userType').value
            })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('user', JSON.stringify(data));
            errorDiv.textContent = 'Profile updated successfully!';
            errorDiv.classList.remove('hidden');
            errorDiv.classList.remove('text-error');
            errorDiv.classList.add('text-green-600');
        } else {
            errorDiv.textContent = data.message || 'Update failed';
            errorDiv.classList.remove('hidden');
            errorDiv.classList.add('text-error');
        }
    } catch (err) {
        errorDiv.textContent = 'Connection error';
        errorDiv.classList.remove('hidden');
        errorDiv.classList.add('text-error');
    }
});
</script>
</body>
</html>
