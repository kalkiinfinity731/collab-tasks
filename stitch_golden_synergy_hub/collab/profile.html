<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Collab | Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800;900&amp;family=Work+Sans:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = {
    theme: {
      extend: {
        "colors": { "primary": "#795900", "primary-container": "#fbbf24", "on-surface": "#191c1e", "surface": "#f8f9fb", "charcoal": "#1F2937", "error": "#ba1a1a" }
      }
    }
  }
</script>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-4">
<div id="app" class="hidden max-w-md w-full bg-white border-2 border-charcoal p-8 shadow-[6px_6px_0px_0px_#1F2937]">
<div class="text-center mb-8">
<div class="w-12 h-12 bg-primary-container mx-auto mb-4 flex items-center justify-center border-2 border-charcoal">
<span class="material-symbols-outlined text-2xl">person</span>
</div>
<h1 class="font-bold text-2xl text-charcoal">User Profile</h1>
</div>

<form id="profile-form" class="space-y-4">
<div>
<label class="block font-bold text-sm mb-2">Name</label>
<input type="text" id="name" required class="w-full border-2 border-charcoal px-4 py-2 focus:border-primary"/>
</div>
<div>
<label class="block font-bold text-sm mb-2">Email</label>
<input type="email" id="email" required class="w-full border-2 border-charcoal px-4 py-2 focus:border-primary" disabled/>
</div>
<div>
<label class="block font-bold text-sm mb-2">Designation</label>
<select id="designation" required class="w-full border-2 border-charcoal px-4 py-2 focus:border-primary">
<option value="">Select Designation</option>
<option value="developer">Developer</option>
<option value="tester">Tester</option>
<option value="team_lead">Team Lead</option>
<option value="manager">Manager</option>
<option value="team_member">Team Member</option>
<option value="designer">Designer</option>
<option value="product_owner">Product Owner</option>
<option value="scrum_master">Scrum Master</option>
</select>
</div>
<div id="errorMsg" class="text-error text-sm hidden"></div>
<button type="submit" class="w-full bg-primary-container text-charcoal font-bold py-3 px-4 border-2 border-charcoal">
Save Profile
</button>
</form>

<p class="text-center text-sm mt-6">
<a href="kanban.html" class="text-primary font-bold">Back to Board</a>
</p>
<button type="button" id="logout-btn" class="w-full border-2 border-charcoal px-3 py-2 text-sm font-bold hover:bg-charcoal hover:text-white transition-colors mt-4">Logout</button>
</div>

<div id="auth-check" class="min-h-screen flex items-center justify-center">
<p>Redirecting to <a href="index.html" class="text-primary font-bold">login</a>...</p>
</div>

<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');

if (!token) {
    document.getElementById('auth-check').innerHTML = '<p>Redirecting to <a href="index.html" class="text-primary font-bold">login</a>...</p>';
    setTimeout(() => window.location.href = 'index.html', 1000);
} else {
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('name').value = user.name || '';
    document.getElementById('email').value = user.email || '';
    document.getElementById('designation').value = user.designation || user.role || '';
    
    document.getElementById('logout-btn').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    });
}

document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('errorMsg');
    
    try {
        const res = await fetch('/api/users/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({
                name: document.getElementById('name').value,
                designation: document.getElementById('designation').value
            })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('user', JSON.stringify(data));
            errorDiv.textContent = 'Profile updated successfully!';
            errorDiv.classList.remove('hidden');
            errorDiv.classList.remove('text-error');
            errorDiv.classList.add('text-green-600');
        } else {
            errorDiv.textContent = data.message || 'Update failed';
            errorDiv.classList.remove('hidden');
            errorDiv.classList.add('text-error');
        }
    } catch (err) {
        errorDiv.textContent = 'Connection error';
        errorDiv.classList.remove('hidden');
        errorDiv.classList.add('text-error');
    }
});
</script>
</body>
</html>
